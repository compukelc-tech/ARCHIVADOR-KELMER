<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Archivos - compukelc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.9);
            color: #1f2937;
        }
        .hidden { display: none !important; }
        .valid { color: #10b981; }
        .invalid { color: #ef4444; }
    </style>
</head>
<body class="flex items-center justify-center p-4 text-white">

<script>
    // === CONFIGURACIÓN ===
    const API_URL = 'PEGAR_AQUI_TU_URL_DE_APPS_SCRIPT'; 
    let currentUser = null;

    // === COMUNICACIÓN FETCH CON CORS ===
    async function fetchGAS(action, payload) {
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                redirect: 'follow',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action, payload })
            });
            return await response.json();
        } catch (error) {
            console.error("Fetch Error:", error);
            alert("Error de conexión. Revisa la consola.");
            return { success: false };
        }
    }

    // === NAVEGACIÓN ===
    function showView(viewId) {
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('view-register').classList.add('hidden');
        document.getElementById('view-dashboard').classList.add('hidden');
        document.getElementById(viewId).classList.remove('hidden');
    }

    // === UTILIDADES UI ===
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>

<!-- VISTA: LOGIN -->
<div id="view-login" class="glass w-full max-w-md p-8 rounded-2xl">
    <h2 class="text-2xl font-bold mb-6 text-center">compukelc<br><span class="text-lg font-normal">Sistema Digital</span></h2>
    <form onsubmit="handleLogin(event)" class="space-y-4">
        <div>
            <label class="block text-sm mb-1">Usuario</label>
            <input type="text" id="log-user" class="glass-input w-full p-2 rounded outline-none" required>
        </div>
        <div class="relative">
            <label class="block text-sm mb-1">Contraseña</label>
            <input type="password" id="log-pass" class="glass-input w-full p-2 rounded outline-none pr-10" required>
            <i id="log-eye" class="fas fa-eye absolute right-3 top-9 text-gray-500 cursor-pointer" onclick="togglePassword('log-pass', 'log-eye')"></i>
        </div>
        <button type="submit" id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded font-bold transition">Ingresar</button>
        <p class="text-center text-sm mt-4">¿No tienes cuenta? <a href="#" onclick="showView('view-register')" class="underline text-blue-200">Regístrate</a></p>
    </form>
</div>

<!-- VISTA: REGISTRO -->
<div id="view-register" class="glass w-full max-w-md p-8 rounded-2xl hidden">
    <h2 class="text-2xl font-bold mb-4 text-center">Nuevo Usuario</h2>
    <form onsubmit="handleRegister(event)" class="space-y-4 text-sm">
        <div class="grid grid-cols-2 gap-2">
            <div>
                <label>Documento</label>
                <input type="number" id="reg-doc" class="glass-input w-full p-2 rounded outline-none" required oninput="generateUsername()">
            </div>
            <div>
                <label>Nombre</label>
                <input type="text" id="reg-name" class="glass-input w-full p-2 rounded outline-none" required oninput="generateUsername()">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-2">
            <div>
                <label>Dependencia</label>
                <input type="text" id="reg-dep" class="glass-input w-full p-2 rounded outline-none" required>
            </div>
            <div>
                <label>Correo</label>
                <input type="email" id="reg-email" class="glass-input w-full p-2 rounded outline-none" required>
            </div>
        </div>
        <div>
            <label>Usuario (Autogenerado)</label>
            <input type="text" id="reg-user" class="glass-input w-full p-2 rounded outline-none bg-gray-200 cursor-not-allowed" readonly>
        </div>
        
        <div class="relative">
            <label>Contraseña</label>
            <input type="password" id="reg-pass" class="glass-input w-full p-2 rounded outline-none pr-10" required oninput="validatePassword()">
            <i id="reg-eye-1" class="fas fa-eye absolute right-3 top-8 text-gray-500 cursor-pointer" onclick="togglePassword('reg-pass', 'reg-eye-1')"></i>
        </div>
        
        <ul class="text-xs space-y-1 bg-black/20 p-2 rounded">
            <li id="chk-len" class="invalid"><i class="fas fa-times mr-1"></i> Mínimo 8 caracteres</li>
            <li id="chk-num" class="invalid"><i class="fas fa-times mr-1"></i> Al menos un número</li>
            <li id="chk-cap" class="invalid"><i class="fas fa-times mr-1"></i> Al menos una mayúscula</li>
        </ul>

        <div class="relative">
            <label>Confirmar Contraseña</label>
            <input type="password" id="reg-pass-conf" class="glass-input w-full p-2 rounded outline-none pr-10" required oninput="validatePassword()">
            <i id="reg-eye-2" class="fas fa-eye absolute right-3 top-8 text-gray-500 cursor-pointer" onclick="togglePassword('reg-pass-conf', 'reg-eye-2')"></i>
        </div>
        <p id="chk-match" class="text-xs invalid hidden"><i class="fas fa-times mr-1"></i> Las contraseñas no coinciden</p>

        <button type="submit" id="btn-register" class="w-full bg-green-600 hover:bg-green-700 p-2 rounded font-bold transition disabled:opacity-50" disabled>Registrar</button>
        <p class="text-center mt-2"><a href="#" onclick="showView('view-login')" class="underline text-blue-200">Volver al login</a></p>
    </form>
</div>

<!-- VISTA: DASHBOARD -->
<div id="view-dashboard" class="glass w-full max-w-lg p-8 rounded-2xl hidden">
    <div class="flex justify-between items-center mb-6 border-b border-white/20 pb-4">
        <div>
            <h2 class="text-xl font-bold">Bienvenido, <span id="dash-name" class="text-blue-300"></span></h2>
            <p class="text-sm opacity-80">Doc: <span id="dash-doc"></span></p>
        </div>
        <button onclick="logout()" class="bg-red-500/80 hover:bg-red-600 p-2 rounded text-sm"><i class="fas fa-sign-out-alt"></i> Salir</button>
    </div>

    <div class="space-y-4">
        <h3 class="font-semibold text-lg"><i class="fas fa-cloud-upload-alt mr-2"></i> Subir Archivo</h3>
        
        <div class="flex gap-4">
            <!-- Escanear desde móvil -->
            <label class="flex-1 bg-blue-600 hover:bg-blue-700 p-3 rounded text-center cursor-pointer transition">
                <i class="fas fa-camera block text-xl mb-1"></i> Escanear
                <input type="file" id="file-cam" accept="image/*" capture="environment" class="hidden" onchange="processFile(this)">
            </label>
            <!-- Subir desde equipo -->
            <label class="flex-1 bg-purple-600 hover:bg-purple-700 p-3 rounded text-center cursor-pointer transition">
                <i class="fas fa-folder-open block text-xl mb-1"></i> Explorar
                <input type="file" id="file-pc" accept="*/*" class="hidden" onchange="processFile(this)">
            </label>
        </div>

        <div id="preview-container" class="hidden mt-4 p-4 bg-black/20 rounded">
            <p class="text-sm font-bold truncate" id="file-name-display"></p>
            <div class="mt-3 flex gap-4">
                <label><input type="radio" name="visibility" value="Privado" checked> Privado</label>
                <label><input type="radio" name="visibility" value="Publico"> Público</label>
            </div>
            <button id="btn-upload" onclick="uploadFile()" class="w-full mt-4 bg-green-500 hover:bg-green-600 p-2 rounded font-bold flex items-center justify-center">
                <span id="upload-text">Subir Archivo</span>
                <i id="upload-spinner" class="fas fa-spinner fa-spin hidden ml-2"></i>
            </button>
        </div>
    </div>
</div>

<script>
    // === LÓGICA DE LOGIN ===
    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-login');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Validando...';
        btn.disabled = true;

        const payload = {
            usuario: document.getElementById('log-user').value,
            password: document.getElementById('log-pass').value
        };

        const res = await fetchGAS('login', payload);
        
        if (res.success) {
            currentUser = res;
            document.getElementById('dash-name').innerText = res.nombre;
            document.getElementById('dash-doc').innerText = res.documento;
            showView('view-dashboard');
            document.getElementById('log-pass').value = '';
        } else {
            alert(res.error);
        }
        
        btn.innerHTML = 'Ingresar';
        btn.disabled = false;
    }

    function logout() {
        currentUser = null;
        showView('view-login');
    }

    // === LÓGICA DE REGISTRO ===
    // Bloquear Pegado en Confirmar Contraseña
    document.getElementById('reg-pass-conf').addEventListener('paste', e => e.preventDefault());

    function generateUsername() {
        const name = document.getElementById('reg-name').value.trim();
        const doc = document.getElementById('reg-doc').value.trim();
        if (name && doc) {
            const firstWord = name.split(' ')[0].normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            const lastTwo = doc.slice(-2);
            document.getElementById('reg-user').value = `${firstWord}${lastTwo}`;
        }
    }

    function validatePassword() {
        const pass = document.getElementById('reg-pass').value;
        const conf = document.getElementById('reg-pass-conf').value;
        
        const hasLen = pass.length >= 8;
        const hasNum = /[0-9]/.test(pass);
        const hasCap = /[A-Z]/.test(pass);
        const match = pass === conf && pass.length > 0;

        const updateCheck = (id, valid) => {
            const el = document.getElementById(id);
            if(valid) { el.className = 'valid'; el.innerHTML = '<i class="fas fa-check mr-1"></i>' + el.innerText; }
            else { el.className = 'invalid'; el.innerHTML = '<i class="fas fa-times mr-1"></i>' + el.innerText; }
        };

        updateCheck('chk-len', hasLen);
        updateCheck('chk-num', hasNum);
        updateCheck('chk-cap', hasCap);

        const matchEl = document.getElementById('chk-match');
        if (conf.length > 0) {
            matchEl.classList.remove('hidden');
            if(match) { matchEl.className = 'text-xs valid'; matchEl.innerHTML = '<i class="fas fa-check mr-1"></i> Coinciden'; }
            else { matchEl.className = 'text-xs invalid'; matchEl.innerHTML = '<i class="fas fa-times mr-1"></i> No coinciden'; }
        } else {
            matchEl.classList.add('hidden');
        }

        document.getElementById('btn-register').disabled = !(hasLen && hasNum && hasCap && match);
    }

    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-register');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
        btn.disabled = true;

        const payload = {
            documento: document.getElementById('reg-doc').value,
            nombre: document.getElementById('reg-name').value,
            dependencia: document.getElementById('reg-dep').value,
            correo: document.getElementById('reg-email').value,
            usuario: document.getElementById('reg-user').value,
            password: document.getElementById('reg-pass').value
        };

        const res = await fetchGAS('registrarUsuario', payload);
        alert(res.success ? "Registro exitoso. Ya puedes iniciar sesión." : res.error);
        
        if(res.success) {
            e.target.reset();
            showView('view-login');
        }
        
        btn.innerHTML = 'Registrar';
        btn.disabled = false;
    }

    // === LÓGICA DE SUBIDA Y COMPRESIÓN ===
    let currentFile = null;

    function processFile(input) {
        if (!input.files || input.files.length === 0) return;
        const file = input.files[0];
        
        document.getElementById('file-name-display').innerText = file.name;
        document.getElementById('preview-container').classList.remove('hidden');

        // Compresión de imagen si aplica
        if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > 1200) {
                        height = Math.round((height * 1200) / width);
                        width = 1200;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Comprimir a 0.6
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                    currentFile = {
                        base64: dataUrl,
                        name: file.name.replace(/\.[^/.]+$/, "") + ".jpg",
                        type: 'image/jpeg'
                    };
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        } else {
            // Archivos normales (PDF, Docx)
            const reader = new FileReader();
            reader.onload = (e) => {
                currentFile = {
                    base64: e.target.result,
                    name: file.name,
                    type: file.type
                };
            };
            reader.readAsDataURL(file);
        }
    }

    async function uploadFile() {
        if (!currentFile) return;
        
        const btn = document.getElementById('btn-upload');
        const text = document.getElementById('upload-text');
        const spinner = document.getElementById('upload-spinner');
        
        btn.disabled = true;
        btn.classList.add('opacity-50');
        text.innerText = 'Subiendo...';
        spinner.classList.remove('hidden');

        const visibility = document.querySelector('input[name="visibility"]:checked').value;

        const payload = {
            base64: currentFile.base64,
            filename: currentFile.name,
            mimeType: currentFile.type,
            visibilidad: visibility,
            documento: currentUser.documento
        };

        const res = await fetchGAS('subirArchivo', payload);
        
        if (res.success) {
            alert('Archivo subido con éxito.');
            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('file-cam').value = '';
            document.getElementById('file-pc').value = '';
            currentFile = null;
        } else {
            alert('Error al subir el archivo: ' + res.error);
        }

        btn.disabled = false;
        btn.classList.remove('opacity-50');
        text.innerText = 'Subir Archivo';
        spinner.classList.add('hidden');
    }
</script>

</body>
</html>
