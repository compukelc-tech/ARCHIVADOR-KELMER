<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Archivos Digital | COMPUKELC</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  body {
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
    min-height: 100vh;
  }
  .glass {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.15);
  }
  .glass-input {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.15);
  }
  .glass-input:focus {
    border-color: rgba(96, 165, 250, 0.7);
    outline: none;
  }
  .vista { display: none; }
  .vista.activa { display: block; }
  .check-ok { color: #4ade80; }
  .check-fail { color: #f87171; }
  .spinner {
    border-top-color: transparent;
    animation: girar 0.7s linear infinite;
  }
  @keyframes girar { to { transform: rotate(360deg); } }
</style>
</head>
<body class="text-white flex items-center justify-center p-4">

<div class="w-full max-w-md">

  <!-- ===================== LOGIN ===================== -->
  <div id="vistaLogin" class="vista activa glass rounded-2xl shadow-2xl p-8">
    <div class="text-center mb-8">
      <i class="fa-solid fa-folder-open text-4xl text-blue-400 mb-2"></i>
      <h1 class="text-2xl font-bold">COMPUKELC</h1>
      <p class="text-slate-300 text-sm">Sistema de Archivos Digital</p>
    </div>

    <div id="loginError" class="hidden bg-red-500/20 border border-red-400 text-red-200 text-sm rounded-lg p-3 mb-4"></div>

    <form id="formLogin" class="space-y-4">
      <div>
        <label class="text-sm text-slate-300">Usuario</label>
        <input type="text" id="loginUsuario" required
          class="glass-input w-full rounded-lg px-4 py-2 mt-1 text-white placeholder-slate-400"
          placeholder="Tu usuario">
      </div>
      <div class="relative">
        <label class="text-sm text-slate-300">Contraseña</label>
        <input type="password" id="loginPassword" required
          class="glass-input w-full rounded-lg px-4 py-2 mt-1 text-white placeholder-slate-400 pr-10"
          placeholder="Tu contraseña">
        <button type="button" onclick="alternarVisibilidad('loginPassword', this)"
          class="absolute right-3 top-9 text-slate-300 hover:text-white">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
      <button type="submit" id="btnLogin"
        class="w-full bg-blue-500 hover:bg-blue-600 transition rounded-lg py-2.5 font-semibold flex items-center justify-center gap-2">
        <span>Ingresar</span>
        <i id="spinnerLogin" class="fa-solid fa-circle-notch fa-spin hidden"></i>
      </button>
    </form>

    <p class="text-center text-sm text-slate-300 mt-6">
      ¿No tienes cuenta?
      <a href="#" onclick="mostrarVista('vistaRegistro')" class="text-blue-400 hover:underline">Regístrate</a>
    </p>
  </div>

  <!-- ===================== REGISTRO ===================== -->
  <div id="vistaRegistro" class="vista glass rounded-2xl shadow-2xl p-8">
    <div class="text-center mb-6">
      <i class="fa-solid fa-user-plus text-4xl text-blue-400 mb-2"></i>
      <h1 class="text-2xl font-bold">Crear cuenta</h1>
    </div>

    <div id="registroError" class="hidden bg-red-500/20 border border-red-400 text-red-200 text-sm rounded-lg p-3 mb-4"></div>
    <div id="registroExito" class="hidden bg-green-500/20 border border-green-400 text-green-200 text-sm rounded-lg p-3 mb-4"></div>

    <form id="formRegistro" class="space-y-3">
      <div>
        <label class="text-sm text-slate-300">Documento</label>
        <input type="text" id="regDocumento" required
          class="glass-input w-full rounded-lg px-4 py-2 mt-1 text-white">
      </div>
      <div>
        <label class="text-sm text-slate-300">Nombre completo</label>
        <input type="text" id="regNombre" required
          class="glass-input w-full rounded-lg px-4 py-2 mt-1 text-white">
      </div>
      <div>
        <label class="text-sm text-slate-300">Dependencia</label>
        <input type="text" id="regDependencia"
          class="glass-input w-full rounded-lg px-4 py-2 mt-1 text-white">
      </div>
      <div>
        <label class="text-sm text-slate-300">Correo</label>
        <input type="email" id="regCorreo"
          class="glass-input w-full rounded-lg px-4 py-2 mt-1 text-white">
      </div>
      <div>
        <label class="text-sm text-slate-300">Usuario generado</label>
        <input type="text" id="regUsuario" readonly
          class="glass-input w-full rounded-lg px-4 py-2 mt-1 text-slate-300 cursor-not-allowed">
      </div>
      <div class="relative">
        <label class="text-sm text-slate-300">Contraseña</label>
        <input type="password" id="regPassword" required
          class="glass-input w-full rounded-lg px-4 py-2 mt-1 text-white pr-10">
        <button type="button" onclick="alternarVisibilidad('regPassword', this)"
          class="absolute right-3 top-9 text-slate-300 hover:text-white">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
      <div class="relative">
        <label class="text-sm text-slate-300">Confirmar contraseña</label>
        <input type="password" id="regPasswordConfirm" required
          class="glass-input w-full rounded-lg px-4 py-2 mt-1 text-white pr-10">
        <button type="button" onclick="alternarVisibilidad('regPasswordConfirm', this)"
          class="absolute right-3 top-9 text-slate-300 hover:text-white">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>

      <ul class="text-xs space-y-1 pt-1">
        <li id="checkLongitud"><i class="fa-solid fa-circle-xmark check-fail"></i> Mínimo 8 caracteres</li>
        <li id="checkMayuscula"><i class="fa-solid fa-circle-xmark check-fail"></i> Al menos 1 mayúscula</li>
        <li id="checkNumero"><i class="fa-solid fa-circle-xmark check-fail"></i> Al menos 1 número</li>
        <li id="checkCoincide"><i class="fa-solid fa-circle-xmark check-fail"></i> Las contraseñas coinciden</li>
      </ul>

      <button type="submit" id="btnRegistro"
        class="w-full bg-blue-500 hover:bg-blue-600 transition rounded-lg py-2.5 font-semibold flex items-center justify-center gap-2 mt-2">
        <span>Registrarme</span>
        <i id="spinnerRegistro" class="fa-solid fa-circle-notch fa-spin hidden"></i>
      </button>
    </form>

    <p class="text-center text-sm text-slate-300 mt-6">
      ¿Ya tienes cuenta?
      <a href="#" onclick="mostrarVista('vistaLogin')" class="text-blue-400 hover:underline">Inicia sesión</a>
    </p>
  </div>

  <!-- ===================== DASHBOARD ===================== -->
  <div id="vistaDashboard" class="vista glass rounded-2xl shadow-2xl p-8">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-xl font-bold" id="saludoUsuario">Bienvenido</h1>
        <p class="text-slate-300 text-sm" id="rolUsuario"></p>
      </div>
      <button onclick="cerrarSesion()" class="text-slate-300 hover:text-red-400" title="Cerrar sesión">
        <i class="fa-solid fa-right-from-bracket text-xl"></i>
      </button>
    </div>

    <div id="subidaError" class="hidden bg-red-500/20 border border-red-400 text-red-200 text-sm rounded-lg p-3 mb-4"></div>
    <div id="subidaExito" class="hidden bg-green-500/20 border border-green-400 text-green-200 text-sm rounded-lg p-3 mb-4"></div>

    <div class="grid grid-cols-2 gap-3 mb-4">
      <label class="glass-input rounded-lg py-3 flex flex-col items-center justify-center cursor-pointer hover:bg-white/10 transition">
        <i class="fa-solid fa-camera text-xl mb-1"></i>
        <span class="text-xs">Escanear documento</span>
        <input type="file" accept="image/*" capture="environment" class="hidden" onchange="manejarArchivoSeleccionado(event)">
      </label>
      <label class="glass-input rounded-lg py-3 flex flex-col items-center justify-center cursor-pointer hover:bg-white/10 transition">
        <i class="fa-solid fa-upload text-xl mb-1"></i>
        <span class="text-xs">Subir desde equipo</span>
        <input type="file" accept="image/*,.pdf" class="hidden" onchange="manejarArchivoSeleccionado(event)">
      </label>
    </div>

    <div id="previaArchivo" class="hidden mb-4">
      <img id="imgPrevia" class="rounded-lg max-h-48 mx-auto hidden">
      <p id="nombreArchivoPrevia" class="text-sm text-slate-300 text-center mt-2"></p>
    </div>

    <div class="mb-4">
      <p class="text-sm text-slate-300 mb-2">Visibilidad</p>
      <div class="flex gap-4">
        <label class="flex items-center gap-2 text-sm">
          <input type="radio" name="visibilidad" value="Publico" checked> Público
        </label>
        <label class="flex items-center gap-2 text-sm">
          <input type="radio" name="visibilidad" value="Privado"> Privado
        </label>
      </div>
    </div>

    <button id="btnSubir" onclick="subirArchivo()" disabled
      class="w-full bg-blue-500 hover:bg-blue-600 disabled:opacity-40 disabled:cursor-not-allowed transition rounded-lg py-2.5 font-semibold flex items-center justify-center gap-2">
      <span>Subir archivo</span>
      <i id="spinnerSubida" class="fa-solid fa-circle-notch fa-spin hidden"></i>
    </button>
  </div>

</div>

<script>
// ==================== CONFIGURACIÓN ====================
const API_URL = 'https://script.google.com/macros/s/AKfycbzP9fSR_RcFe3BbmvXWluFs5REYUJueVpOkIiMg3wjsnUXup2oi5a3Uz6sGbchNR-lq/exec';

let usuarioActual = null;
let archivoBase64Comprimido = null;
let archivoNombreActual = null;
let archivoMimeActual = null;

// ==================== NAVEGACIÓN DE VISTAS ====================
function mostrarVista(idVista) {
  document.querySelectorAll('.vista').forEach(v => v.classList.remove('activa'));
  document.getElementById(idVista).classList.add('activa');
}

function alternarVisibilidad(idInput, boton) {
  const input = document.getElementById(idInput);
  const icono = boton.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icono.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icono.classList.replace('fa-eye-slash', 'fa-eye');
  }
}

// ==================== COMUNICACIÓN CON EL API ====================
async function llamarAPI(accion, payload) {
  const cuerpo = Object.assign({ accion: accion }, payload);
  const respuesta = await fetch(API_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(cuerpo)
  });
  return respuesta.json();
}

// ==================== LOGIN ====================
document.getElementById('formLogin').addEventListener('submit', async function(e) {
  e.preventDefault();
  const errorBox = document.getElementById('loginError');
  const btn = document.getElementById('btnLogin');
  const spinner = document.getElementById('spinnerLogin');
  errorBox.classList.add('hidden');

  const usuario = document.getElementById('loginUsuario').value.trim();
  const password = document.getElementById('loginPassword').value;

  btn.disabled = true;
  spinner.classList.remove('hidden');

  try {
    const resultado = await llamarAPI('login', { usuario, password });
    if (resultado.success) {
      usuarioActual = resultado.data;
      document.getElementById('saludoUsuario').textContent = 'Hola, ' + usuarioActual.nombre;
      document.getElementById('rolUsuario').textContent = usuarioActual.rol;
      mostrarVista('vistaDashboard');
    } else {
      errorBox.textContent = resultado.message;
      errorBox.classList.remove('hidden');
    }
  } catch (error) {
    errorBox.textContent = 'No fue posible conectar con el servidor.';
    errorBox.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    spinner.classList.add('hidden');
  }
});

function cerrarSesion() {
  usuarioActual = null;
  document.getElementById('formLogin').reset();
  mostrarVista('vistaLogin');
}

// ==================== REGISTRO ====================
function quitarTildes(texto) {
  return texto.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function generarUsuario() {
  const nombre = document.getElementById('regNombre').value.trim();
  const documento = document.getElementById('regDocumento').value.trim();
  if (!nombre || !documento) {
    document.getElementById('regUsuario').value = '';
    return;
  }
  const primerNombre = quitarTildes(nombre.split(' ')[0] || '').toLowerCase().replace(/[^a-z]/g, '');
  const ultimosDigitos = documento.replace(/\D/g, '').slice(-2);
  document.getElementById('regUsuario').value = primerNombre + ultimosDigitos;
}
document.getElementById('regNombre').addEventListener('input', generarUsuario);
document.getElementById('regDocumento').addEventListener('input', generarUsuario);

function validarPassword() {
  const password = document.getElementById('regPassword').value;
  const confirmacion = document.getElementById('regPasswordConfirm').value;

  const tieneLongitud = password.length >= 8;
  const tieneMayuscula = /[A-Z]/.test(password);
  const tieneNumero = /[0-9]/.test(password);
  const coincide = password.length > 0 && password === confirmacion;

  actualizarCheck('checkLongitud', tieneLongitud, 'Mínimo 8 caracteres');
  actualizarCheck('checkMayuscula', tieneMayuscula, 'Al menos 1 mayúscula');
  actualizarCheck('checkNumero', tieneNumero, 'Al menos 1 número');
  actualizarCheck('checkCoincide', coincide, 'Las contraseñas coinciden');

  return tieneLongitud && tieneMayuscula && tieneNumero && coincide;
}

function actualizarCheck(idElemento, cumple, texto) {
  const li = document.getElementById(idElemento);
  const icono = cumple ? 'fa-circle-check' : 'fa-circle-xmark';
  const claseColor = cumple ? 'check-ok' : 'check-fail';
  li.innerHTML = '<i class="fa-solid ' + icono + ' ' + claseColor + '"></i> ' + texto;
}

document.getElementById('regPassword').addEventListener('input', validarPassword);
document.getElementById('regPasswordConfirm').addEventListener('input', validarPassword);
document.getElementById('regPasswordConfirm').addEventListener('paste', function(e) {
  e.preventDefault();
});

document.getElementById('formRegistro').addEventListener('submit', async function(e) {
  e.preventDefault();
  const errorBox = document.getElementById('registroError');
  const exitoBox = document.getElementById('registroExito');
  const btn = document.getElementById('btnRegistro');
  const spinner = document.getElementById('spinnerRegistro');
  errorBox.classList.add('hidden');
  exitoBox.classList.add('hidden');

  if (!validarPassword()) {
    errorBox.textContent = 'La contraseña no cumple los requisitos o no coincide.';
    errorBox.classList.remove('hidden');
    return;
  }

  const payload = {
    documento: document.getElementById('regDocumento').value.trim(),
    nombre: document.getElementById('regNombre').value.trim(),
    dependencia: document.getElementById('regDependencia').value.trim(),
    correo: document.getElementById('regCorreo').value.trim(),
    usuario: document.getElementById('regUsuario').value.trim(),
    password: document.getElementById('regPassword').value
  };

  btn.disabled = true;
  spinner.classList.remove('hidden');

  try {
    const resultado = await llamarAPI('registrarUsuario', payload);
    if (resultado.success) {
      exitoBox.textContent = 'Cuenta creada correctamente. Ya puedes iniciar sesión.';
      exitoBox.classList.remove('hidden');
      document.getElementById('formRegistro').reset();
      setTimeout(() => mostrarVista('vistaLogin'), 1500);
    } else {
      errorBox.textContent = resultado.message;
      errorBox.classList.remove('hidden');
    }
  } catch (error) {
    errorBox.textContent = 'No fue posible conectar con el servidor.';
    errorBox.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    spinner.classList.add('hidden');
  }
});

// ==================== DASHBOARD: CAPTURA Y COMPRESIÓN ====================
function manejarArchivoSeleccionado(event) {
  const archivo = event.target.files[0];
  if (!archivo) return;

  archivoNombreActual = archivo.name;
  archivoMimeActual = archivo.type || 'image/jpeg';

  if (archivo.type.startsWith('image/')) {
    comprimirImagen(archivo);
  } else {
    // Archivos no-imagen (ej. PDF) se codifican directamente sin compresión
    const lector = new FileReader();
    lector.onload = function(e) {
      archivoBase64Comprimido = e.target.result;
      mostrarPreviaArchivo(null, archivo.name);
      document.getElementById('btnSubir').disabled = false;
    };
    lector.readAsDataURL(archivo);
  }
}

function comprimirImagen(archivo) {
  const lector = new FileReader();
  lector.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const anchoMaximo = 1200;
      let ancho = img.width;
      let alto = img.height;

      if (ancho > anchoMaximo) {
        alto = Math.round((alto * anchoMaximo) / ancho);
        ancho = anchoMaximo;
      }

      const canvas = document.createElement('canvas');
      canvas.width = ancho;
      canvas.height = alto;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, ancho, alto);

      const base64Comprimido = canvas.toDataURL('image/jpeg', 0.6);
      archivoBase64Comprimido = base64Comprimido;
      archivoMimeActual = 'image/jpeg';

      mostrarPreviaArchivo(base64Comprimido, archivo.name);
      document.getElementById('btnSubir').disabled = false;
    };
    img.src = e.target.result;
  };
  lector.readAsDataURL(archivo);
}

function mostrarPreviaArchivo(base64Imagen, nombre) {
  const contenedor = document.getElementById('previaArchivo');
  const img = document.getElementById('imgPrevia');
  contenedor.classList.remove('hidden');

  if (base64Imagen) {
    img.src = base64Imagen;
    img.classList.remove('hidden');
  } else {
    img.classList.add('hidden');
  }
  document.getElementById('nombreArchivoPrevia').textContent = nombre;
}

// ==================== DASHBOARD: SUBIDA ====================
async function subirArchivo() {
  if (!archivoBase64Comprimido || !usuarioActual) return;

  const errorBox = document.getElementById('subidaError');
  const exitoBox = document.getElementById('subidaExito');
  const btn = document.getElementById('btnSubir');
  const spinner = document.getElementById('spinnerSubida');
  errorBox.classList.add('hidden');
  exitoBox.classList.add('hidden');

  const visibilidad = document.querySelector('input[name="visibilidad"]:checked').value;

  btn.disabled = true;
  spinner.classList.remove('hidden');

  try {
    const resultado = await llamarAPI('subirArchivo', {
      base64: archivoBase64Comprimido,
      nombre: archivoNombreActual,
      mimeType: archivoMimeActual,
      visibilidad: visibilidad,
      documento: usuarioActual.documento
    });

    if (resultado.success) {
      exitoBox.textContent = 'Archivo subido exitosamente.';
      exitoBox.classList.remove('hidden');
      document.getElementById('previaArchivo').classList.add('hidden');
      archivoBase64Comprimido = null;
      archivoNombreActual = null;
      archivoMimeActual = null;
      btn.disabled = true; // se rehabilita solo al seleccionar un nuevo archivo
    } else {
      errorBox.textContent = resultado.message;
      errorBox.classList.remove('hidden');
      btn.disabled = false; // el archivo sigue cargado: permite reintentar sin reseleccionar
    }
  } catch (error) {
    errorBox.textContent = 'No fue posible conectar con el servidor.';
    errorBox.classList.remove('hidden');
    btn.disabled = false; // permite reintentar sin reseleccionar el archivo
  } finally {
    spinner.classList.add('hidden');
  }
}
</script>
</body>
</html>
