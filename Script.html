<script>
// Variables globales
let currentUser = null;
let googleToken = null;

// Google Sign-In
function handleCredentialResponse(response) {
  googleToken = response.credential;
  
  google.script.run
    .withSuccessHandler(onUserVerified)
    .withFailureHandler(onError)
    .verifyGoogleToken(googleToken);
}

function onUserVerified(result) {
  if (result.success) {
    currentUser = result.user;
    document.getElementById('user-info').innerHTML = `
      <span class="text-sm">${currentUser[1]}</span>
      <button onclick="logout()" class="ml-4 px-4 py-2 bg-red-600 hover:bg-red-700 rounded-xl text-sm">Cerrar sesión</button>
    `;
    showSection('dashboard');
  } else {
    alert(result.message || 'Error al verificar usuario');
  }
}

function onError(err) {
  console.error(err);
  alert('Error de autenticación');
}

// Mostrar secciones
function showSection(section) {
  const content = document.getElementById('main-content');
  
  if (section === 'dashboard') {
    content.innerHTML = `<h2 class="text-3xl font-semibold mb-8">Bienvenido, ${currentUser ? currentUser[1] : ''}</h2><p>Panel en construcción...</p>`;
  } 
  else if (section === 'upload') {
    content.innerHTML = `
      <div class="max-w-2xl">
        <h2 class="text-2xl font-semibold mb-6">Subir Archivos</h2>
        <input type="file" id="fileInput" multiple class="block w-full text-sm text-gray-400 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700" />
        <div class="mt-6 flex gap-4">
          <button onclick="uploadFiles()" class="flex-1 bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-medium">📤 Subir Archivos</button>
          <button onclick="document.getElementById('fileInput').click()" class="flex-1 border border-gray-700 hover:bg-gray-800 py-4 rounded-2xl">Seleccionar más</button>
        </div>
      </div>
    `;
  }
  // Más secciones después...
}

// Logout
function logout() {
  currentUser = null;
  location.reload();
}

// Subir archivos (con compresión)
function uploadFiles() {
  const files = document.getElementById('fileInput').files;
  if (!files.length) return alert('Selecciona al menos un archivo');

  Array.from(files).forEach(file => {
    if (file.type.startsWith('image/')) {
      compressAndUploadImage(file);
    } else {
      // Subida normal (implementaremos después)
      alert('Subida de ' + file.name + ' (no imagen)');
    }
  });
}

function compressAndUploadImage(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      // Redimensionar manteniendo proporción (máx 1920px)
      let width = img.width;
      let height = img.height;
      if (width > 1920) {
        height = Math.round(height * 1920 / width);
        width = 1920;
      }
      
      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);
      
      const compressed = canvas.toDataURL('image/jpeg', 0.78); // 78% calidad
      
      google.script.run
        .withSuccessHandler(() => console.log('✅ Subido:', file.name))
        .withFailureHandler(err => console.error(err))
        .uploadFile(compressed, file.name, 'image/jpeg', true, currentUser[4]);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
</script>
